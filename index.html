<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Core -->
    <title>oddwebs — We Build Digital Powerhouses</title>
    <meta name="description" content="oddwebs — We build digital powerhouses. Premium websites, mobile apps, AI systems, and automation solutions for startups and brands worldwide." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://oddwebs.com/" />
    <meta name="theme-color" content="#0b0705" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="oddwebs — We Build Digital Powerhouses" />
    <meta property="og:description" content="Premium websites, mobile apps, AI systems, and automation solutions for startups and brands worldwide." />
    <meta property="og:url" content="https://oddwebs.com/" />
    <meta property="og:site_name" content="oddwebs" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="oddwebs — We Build Digital Powerhouses" />
    <meta name="twitter:description" content="Premium websites, mobile apps, AI systems, and automation solutions for startups and brands worldwide." />

    <!-- Font preconnects — resolve DNS + TLS before font requests -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts — trimmed to weights actually used, font-display: swap -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "oddwebs",
      "url": "https://oddwebs.com",
      "description": "We build digital powerhouses. Premium websites, mobile apps, AI systems, and automation solutions.",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
